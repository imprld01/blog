---
layout: default
---

<article id="main">
	<header class="special container">
		<span class="icon fa-bookmark-o"></span>
		<h2 class="post-title">{{ page.title }}</h2>
		<p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • <a href="{{ site.github_url }}" style="color:white" target="_blank">{{ page.author }}</a>{% endif %}</p>
	</header>

	<section class="style4 wrapper container">
		{{ content }}
	</section>

	<footer>
		{% if page.previous %}
			<a href="{{ page.previous.url }}" class="post-prev">&larr; Previous post</a>
		{% endif %}
		{% if page.next %}
			<a href="{{ page.next.url }}" class="post-next">Next post &rarr;</a>
		{% endif %}
	</footer>
</article>
